<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LATIHAN CSS</title>


    <style>
    
    p{
        color: blue;
        padding: 15px;
    }
    .header{
        background-color: yellow;
        text-align: center;
        width: 200px;
        height: 50px
        
        
    }
    .sidebar{
        background-color: rgb(0, 255, 85);
        text-align: center;
        width: 100px;
        height: 50px;
    }
    .main{
        background-color: rgb(0, 102, 255);
        text-align: center;
        width: 100px;
        height: 50px;
    }
    
    .footer{
        background-color: rgb(255, 0, 0);
        text-align: center;
        width: 100px;
        height: 50px;
    }


        
    </style>
</head>
<body>
    <div class="header"><p>Header</p></div>
    <div class="sidebar">Sidebar<div class="main">/div></div>
    <!-- <div class="main">Main</div> -->
    <div class="footer">Footer</div>
</body>
</html>
