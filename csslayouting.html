<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universitas Apa Aja</title>


    <style>

        body{
            margin: 0;
        }

        .besar{
            width: 100%;
            height: 500px;
            background-color: bisque;
        }

        .header{
            background-color: aqua;
            width: 100%;
            height: 100px;
            display: flex;
            flex-direction: row;
            justify-content: space-around;
        }

        .main{
            background-color: azure;
            width: 100%;
            height: 750px;
            display: flex;
            flex-direction: row;
        }

        .footer{
            background-color: brown;
            width: 100%;
            height: 100px;
        }

        .icon{
            width: 120px;
            height: 100%;
            background-color: brown;
            background-image: url(img/img1.webp);
            background-size: cover;
        }

        .judul{
            width: 100%;
            height: 100%;
            background-color: bisque;
            display: flex;
            /* flex-direction: row; */
            justify-content: center;
            align-items: center;
            font-size: 30px;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif ;
            color: white;
        }

        .sidebar{
            width: 300px;
            height: 100%;
            background-color: aqua;
            display: flex;
            flex-direction: column;
            gap: 10px; 
            justify-content: center;
            align-items: center;
        }

        a{
            text-decoration: none;
            background-color: brown;
            color: white;
            padding: 10px 20px 10px 20px;
            border-radius: 10px;
            width: 150px;
            text-align: center;
            
        }
        .isi{
            width: 100%;
            height: 100%;
            background-color: aquamarine;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr ;
        }

        .item{
            height: 100px;
            width: 100px;
            background-color: blue;
        }

        .fb{
            width: 20px;
            height: 10px;
            background-color: blue;
            display: flex;
            flex-direction: row;
        }

    

    </style>
</head>
<body>
    <div class="besar">
        <div class="header">
            <div class="icon"></div>
            <div class="judul">UNIVERSITAS APA AJA </div>
        </div>

        <div class="main">
            <div class="sidebar">
                <a href="">Menu Produk</a>
                <a href="">Menu Kategori</a>
                <a href="">Menu Karyawan</a>

            </div>
            <div class="isi">
                <div class="item">1</div>
                <div class="item">2</div>
                <div class="item">3</div>
                <div class="item">4</div>
                <div class="item">5</div>
                <div class="item">6</div>
            </div>
        </div>
        <div class="footer">
          <a href="fb">Facebook</a>
          <a href="wa">Whatsapp</a>
          <a href="em">Email</a>

        </div>
    </div>
</body>
</html>
